<app-card-template [headerLabel]="config.header!">
  <form [formGroup]="form" class="space-y-5">
    <!-- ชื่อ + อัตรา + สถานะ -->
    <div class="grid grid-cols-3 gap-5">
      <!-- ชื่อค่าบริการ -->
      <div>
        <label for="name" class="block font-semibold mb-2">
          ชื่อค่าบริการ <span class="text-danger">*</span>
        </label>
        <input
          pInputText
          id="name"
          formControlName="name"
          placeholder="ชื่อค่าบริการ"
          class="w-full"
        />
        <app-field-error [control]="form.get('name')" type="text" />
      </div>

      <!-- อัตรา (%) -->
      <div>
        <label for="percentageRate" class="block font-semibold mb-2">
          อัตรา (%) <span class="text-danger">*</span>
        </label>
        <p-inputgroup>
          <p-inputNumber
            id="percentageRate"
            formControlName="percentageRate"
            mode="decimal"
            [minFractionDigits]="0"
            [maxFractionDigits]="2"
            [min]="0"
            [max]="100"
            placeholder="0"
            styleClass="w-full"
          ></p-inputNumber>
          <p-inputgroup-addon>%</p-inputgroup-addon>
        </p-inputgroup>
        <app-field-error [control]="form.get('percentageRate')" type="text" />
      </div>

      <!-- สถานะการใช้งาน -->
      <div>
        <label class="block font-semibold mb-2">สถานะ</label>
        <div class="flex items-center gap-3 h-[46px]">
          <p-inputSwitch
            formControlName="isActive"
            inputId="isActive"
          ></p-inputSwitch>
          <span
            class="font-semibold"
            [class]="form.get('isActive')?.value ? 'text-success' : 'text-danger'"
          >
            {{ form.get("isActive")?.value ? "เปิดใช้งาน" : "ปิดใช้งาน" }}
          </span>
        </div>
      </div>
    </div>

    <!-- รายละเอียดกำกับ -->
    <div>
      <label for="description" class="block font-semibold mb-2">
        รายละเอียดกำกับ
      </label>
      <textarea
        pTextarea
        id="description"
        formControlName="description"
        rows="3"
        placeholder="รายละเอียดกำกับ"
        class="w-full"
        [autoResize]="true"
      ></textarea>
    </div>

    <!-- วันที่เริ่มต้น + วันที่สิ้นสุด -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
      <div>
        <label for="startDate" class="block font-semibold mb-2">
          วันที่เริ่มต้นใช้งาน
        </label>
        <p-datepicker
          id="startDate"
          formControlName="startDate"
          dateFormat="dd/mm/yy"
          placeholder="วันที่เริ่มต้นใช้งาน"
          styleClass="w-full"
        />
      </div>

      <div>
        <label for="endDate" class="block font-semibold mb-2">
          วันที่สิ้นสุดใช้งาน
        </label>
        <p-datepicker
          id="endDate"
          formControlName="endDate"
          dateFormat="dd/mm/yy"
          placeholder="วันที่สิ้นสุดใช้งาน"
          [minDate]="minEndDate()"
          styleClass="w-full"
        />
      </div>
    </div>
  </form>

  <p-footer>
    <p-button
      label="ยกเลิก"
      severity="secondary"
      variant="outlined"
      (onClick)="onCancel()"
      [disabled]="isSubmitting()"
    />
    @if (!isEditMode() || canUpdate) {
      <p-button
        label="บันทึก"
        severity="primary"
        (onClick)="onSubmit()"
        [loading]="isSubmitting()"
      />
    }
  </p-footer>
</app-card-template>
