<app-card-template
  [headerLabel]="config.header!"
  contentClass="space-y-4"
>
  <!-- Success Header -->
  <div
    class="bg-gradient-to-r from-success to-success-text rounded-xl p-6 flex flex-col items-center gap-3 relative overflow-hidden"
  >
    <!-- Decorative Circles -->
    <div
      class="absolute -top-6 -right-6 w-28 h-28 rounded-full bg-white/10"
    ></div>
    <div
      class="absolute -bottom-4 -left-4 w-20 h-20 rounded-full bg-white/10"
    ></div>
    <div
      class="absolute top-1/2 right-1/3 w-10 h-10 rounded-full bg-white/5"
    ></div>
    <div
      class="absolute top-2 left-1/4 w-14 h-14 rounded-full bg-white/5"
    ></div>
    <div
      class="absolute -bottom-2 right-1/4 w-16 h-16 rounded-full bg-white/10"
    ></div>

    <div
      class="w-16 h-16 rounded-full bg-white/20 flex items-center justify-center ring-4 ring-white/20 z-10"
    >
      <app-generic-icon
        name="lock-correct"
        svgClass="w-10 h-10"
        class="text-white"
      ></app-generic-icon>
    </div>
    <div class="text-white text-2xl font-bold z-10">สร้างบัญชีสำเร็จ</div>
  </div>

  <!-- Credentials -->
  <div
    class="border border-surface-border rounded-lg border-l-[6px] border-l-success"
  >
    <div class="divide-y divide-surface-border">
      <div class="grid grid-cols-2 divide-x divide-surface-border">
        <div class="px-5 py-4">
          <div class="text-surface-sub text-lg">Username</div>
          <div class="text-primary font-semibold text-xl mt-1 break-all">
            {{ credentials.username }}
          </div>
        </div>
        <div class="px-5 py-4">
          <div class="text-surface-sub text-lg">Password</div>
          <div class="flex items-center gap-2 mt-1">
            <div
              class="font-bold text-xl font-mono tracking-wider"
            >
              {{ showPassword() ? credentials.password : "••••••••" }}
            </div>
            <button
              class="text-surface-sub hover:text-surface-dark"
              (click)="showPassword.set(!showPassword())"
            >
              <app-generic-icon
                [name]="showPassword() ? 'eye' : 'eye-off'"
                svgClass="w-5 h-5"
              ></app-generic-icon>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Notes -->
  <div class="grid grid-cols-2 gap-3">
    <div class="bg-success-bg rounded-lg p-3 flex items-center gap-2">
      <app-generic-icon
        name="correct-success"
        svgClass="w-6 h-6"
        class="text-success shrink-0"
      ></app-generic-icon>
      <p class="text-sm text-success-text font-semibold">
        ส่งอีเมลแจ้งข้อมูลเข้าสู่ระบบเรียบร้อยแล้ว
      </p>
    </div>
    <div class="bg-danger-bg rounded-lg p-3 flex items-center gap-2">
      <app-generic-icon
        name="information"
        svgClass="w-6 h-6"
        class="text-danger shrink-0"
      ></app-generic-icon>
      <p class="text-sm text-danger font-semibold">
        ปิดหน้าต่างแล้วจะไม่สามารถดูรหัสผ่านได้อีก
      </p>
    </div>
  </div>

  <p-footer>
    <p-button label="ปิด" styleClass="!px-12" (onClick)="onClose()"></p-button>
  </p-footer>
</app-card-template>
