<div class="space-y-5">
  <!-- Page Header -->
  <div class="flex items-center gap-3">
    <div
      class="w-14 h-14 rounded-xl bg-primary flex items-center justify-center"
    >
      <app-generic-icon
        name="coin"
        svgClass="w-8 h-8"
        class="text-white"
      ></app-generic-icon>
    </div>
    <h1 class="text-3xl font-extrabold tracking-tight text-primary">
      {{ isEditMode() ? "แก้ไข Service Charge" : "เพิ่ม Service Charge" }}
    </h1>
  </div>

  <!-- Form -->
  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <app-section-card
      headerLabel="ข้อมูล Service Charge"
      headerIcon="coin"
      contentClass="p-6 grid grid-cols-1 md:grid-cols-3 gap-5"
    >
      <!-- ชื่อ Service Charge -->
      <div class="md:col-span-2">
        <label for="name" class="block font-semibold text-surface-dark mb-2">
          ชื่อ Service Charge <span class="text-danger">*</span>
        </label>
        <input
          pInputText
          id="name"
          formControlName="name"
          placeholder="ชื่อ Service Charge"
          class="w-full"
        />
        <app-field-error [control]="form.get('name')" type="text" />
      </div>

      <!-- อัตรา (%) -->
      <div>
        <label
          for="percentageRate"
          class="block font-semibold text-surface-dark mb-2"
        >
          อัตรา (%) <span class="text-danger">*</span>
        </label>
        <p-inputgroup>
          <p-inputNumber
            id="percentageRate"
            formControlName="percentageRate"
            mode="decimal"
            [minFractionDigits]="0"
            [maxFractionDigits]="2"
            [min]="0"
            [max]="100"
            placeholder="อัตรา (%)"
            styleClass="w-full"
          ></p-inputNumber>
          <p-inputgroup-addon>%</p-inputgroup-addon>
        </p-inputgroup>
        <app-field-error [control]="form.get('percentageRate')" type="text" />
      </div>

      <!-- รายละเอียดกำกับ -->
      <div class="md:col-span-3">
        <label
          for="description"
          class="block font-semibold text-surface-dark mb-2"
        >
          รายละเอียดกำกับ
        </label>
        <textarea
          pTextarea
          id="description"
          formControlName="description"
          rows="3"
          placeholder="รายละเอียดกำกับ"
          class="w-full"
          [autoResize]="true"
        ></textarea>
      </div>

      <!-- วันที่เริ่มต้นใช้งาน -->
      <div>
        <label
          for="startDate"
          class="block font-semibold text-surface-dark mb-2"
        >
          วันที่เริ่มต้นใช้งาน
        </label>
        <p-datepicker
          id="startDate"
          formControlName="startDate"
          dateFormat="dd/mm/yy"
          placeholder="วันที่เริ่มต้นใช้งาน"
          styleClass="w-full"
        />
      </div>

      <!-- วันที่สิ้นสุดใช้งาน -->
      <div>
        <label for="endDate" class="block font-semibold text-surface-dark mb-2">
          วันที่สิ้นสุดใช้งาน
        </label>
        <p-datepicker
          id="endDate"
          formControlName="endDate"
          dateFormat="dd/mm/yy"
          placeholder="วันที่สิ้นสุดใช้งาน"
          [minDate]="minEndDate()"
          styleClass="w-full"
        />
      </div>

      <!-- สถานะการใช้งาน -->
      <div>
        <label for="isActive" class="block font-semibold text-surface-dark mb-2"
          >สถานะการใช้งาน</label
        >
        <div class="flex items-center gap-3 pt-2">
          <p-inputSwitch
            formControlName="isActive"
            inputId="isActive"
          ></p-inputSwitch>
          <span
            class="font-semibold"
            [class]="
              form.get('isActive')?.value ? 'text-success' : 'text-danger'
            "
            >{{
              form.get("isActive")?.value ? "เปิดใช้งาน" : "ปิดใช้งาน"
            }}</span
          >
        </div>
      </div>
    </app-section-card>
  </form>
</div>
