<div class="space-y-4">
  <!-- Success Icon -->
  <div class="flex justify-center">
    <div class="w-16 h-16 rounded-full bg-success-bg flex items-center justify-center">
      <app-generic-icon name="check" svgClass="w-8 h-8" class="text-success"></app-generic-icon>
    </div>
  </div>

  <!-- Credentials -->
  <div class="bg-surface rounded-lg p-4 space-y-3">
    <div>
      <label class="text-sm text-surface-sub">ชื่อผู้ใช้</label>
      <div class="font-semibold text-surface-dark text-lg mt-0.5">{{ credentials.username }}</div>
    </div>
    <div>
      <label class="text-sm text-surface-sub">รหัสผ่าน</label>
      <div class="font-semibold text-surface-dark text-lg mt-0.5 font-mono tracking-wider">{{ credentials.password }}</div>
    </div>
  </div>

  <!-- Email Status -->
  @if (credentials.emailSent) {
    <div class="bg-success-bg rounded-lg p-3 flex items-center gap-2">
      <i class="pi pi-check-circle text-success"></i>
      <span class="text-sm text-success">ส่งอีเมลแจ้งข้อมูลเข้าสู่ระบบเรียบร้อยแล้ว</span>
    </div>
  } @else {
    <div class="bg-warning-bg rounded-lg p-3 flex items-center gap-2">
      <i class="pi pi-exclamation-triangle text-warning"></i>
      <span class="text-sm text-warning-dark">ไม่สามารถส่งอีเมลได้ กรุณาบันทึกข้อมูลด้านบนไว้</span>
    </div>
  }

  <!-- Warning -->
  <p class="text-xs text-danger text-center">
    กรุณาบันทึกข้อมูลนี้ไว้ เมื่อปิดหน้าต่างนี้แล้วจะไม่สามารถดูรหัสผ่านได้อีก
  </p>

  <!-- Footer -->
  <div class="flex justify-end pt-2">
    <p-button label="ปิด" severity="secondary" [outlined]="true"
      (onClick)="onClose()"></p-button>
  </div>
</div>
