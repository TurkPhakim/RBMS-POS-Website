<header class="bg-gradient-to-r from-primary to-primary-dark shadow-md z-40">
  <div class="flex justify-between items-center p-3">
    <!-- Left: Toggle + Logo -->
    <div class="flex items-center space-x-3">
      <button
        (click)="toggleSidebar()"
        class="text-white hover:bg-white/10 rounded-lg p-1 transition-all duration-300"
        type="button"
        title="Toggle Sidebar"
      >
        <div
          class="w-12 h-12 transition-transform duration-300"
          [class.rotate-180]="!isSidebarCollapsed()"
        >
          <app-generic-icon
            [name]="isSidebarCollapsed() ? 'menu-bar' : 'hamburger-nav'"
            svgClass="w-full h-full"
          ></app-generic-icon>
        </div>
      </button>

      <div class="flex items-center space-x-2">
        <div
          class="flex items-center justify-center w-16 h-16"
          [ngClass]="
            brandingService.hasCustomLogo()
              ? 'rounded-xl'
              : 'bg-white rounded-full shadow-md p-1'
          "
        >
          <img
            [src]="brandingService.logoUrl()"
            alt="Shop Logo"
            class="w-full h-full object-contain"
            [class.rounded-xl]="brandingService.hasCustomLogo()"
          />
        </div>
        <h1 class="text-white font-bold text-3xl drop-shadow-md">
          {{ brandingService.shopName() }}
        </h1>
      </div>
    </div>

    <!-- Center: Header Buttons -->
    @if (headerService.headerButtons$ | async; as buttons) {
      @if (buttons.length > 0) {
        <div class="flex items-center gap-2">
          @for (btn of buttons; track btn.key) {
            <p-button
              [label]="btn.label || ''"
              [icon]="btn.icon || ''"
              [severity]="btn.severity || 'secondary'"
              [size]="btn.size || 'small'"
              [rounded]="btn.rounded || false"
              [raised]="btn.raised || false"
              [loading]="btn.loading || false"
              [disabled]="btn.disabled || false"
              [badge]="btn.badge || ''"
              (click)="btn.callback && btn.callback()"
            >
            </p-button>
          }
        </div>
      }
    }

    <!-- Right: Notification + Profile -->
    <div class="flex items-center space-x-2">
      <!-- Notification Bell -->
      <button
        class="relative text-warning-bg rounded-lg p-2 group"
        (click)="toggleNotifications()"
        type="button"
        title="การแจ้งเตือน"
      >
        <div class="origin-top group-hover:animate-bell-ring">
          <app-generic-icon name="bell" svgClass="w-6 h-6"></app-generic-icon>
        </div>
        @if (notiStore.unreadCount() > 0) {
          <span
            class="absolute -top-0.5 -right-0.5 bg-danger text-white text-xs font-bold rounded-full min-w-[18px] h-[18px] flex items-center justify-center px-1"
          >
            {{ notiStore.unreadCount() > 99 ? "99+" : notiStore.unreadCount() }}
          </span>
        }
      </button>

      <!-- Profile Menu -->
      <div
        class="relative profile-menu-container flex items-center space-x-2 text-white"
      >
        <span class="font-semibold whitespace-nowrap text-lg">
          {{ currentUser()?.nickname || currentUser()?.username || "User" }}
        </span>
        <!-- Avatar -->
        @if (profileImageUrl()) {
          <img
            [src]="profileImageUrl()"
            alt="avatar"
            class="w-12 h-12 rounded-full object-cover border-2 border-white/30"
          />
        } @else {
          <div
            class="w-12 h-12 bg-white rounded-full flex items-center justify-center text-primary"
          >
            <app-generic-icon
              name="avatar-default"
              svgClass="w-7 h-7"
            ></app-generic-icon>
          </div>
        }
        <button
          (click)="toggleProfileMenu()"
          class="hover:bg-white/10 rounded-lg p-1 transition-colors duration-200"
          type="button"
        >
          <div
            class="-scale-x-100 transition-transform duration-200"
            [class.rotate-90]="showProfileMenu()"
          >
            <app-generic-icon
              name="menubar"
              svgClass="w-8 h-8"
            ></app-generic-icon>
          </div>
        </button>

        <!-- Dropdown -->
        @if (showProfileMenu()) {
          <div
            class="absolute right-0 top-full mt-1 w-56 bg-surface-card rounded-lg shadow-xl py-1 z-50 border border-surface-border"
          >
            <button
              (click)="navigateToProfile()"
              class="w-full text-left flex items-center px-4 py-2 text-surface-dark hover:bg-surface transition-colors"
              type="button"
            >
              <app-generic-icon
                name="profile"
                svgClass="w-6 h-6"
                class="mr-3 text-surface-sub"
              ></app-generic-icon>
              <span class="font-medium text-lg">โปรไฟล์</span>
            </button>
            <button
              (click)="openChangePassword()"
              class="w-full text-left flex items-center px-4 py-2 text-surface-dark hover:bg-surface transition-colors"
              type="button"
            >
              <app-generic-icon
                name="password-reset"
                svgClass="w-6 h-6"
                class="mr-3 text-surface-sub"
              ></app-generic-icon>
              <span class="font-medium text-lg">เปลี่ยนรหัสผ่าน</span>
            </button>
            <hr class="border-surface-border" />
            <button
              (click)="logout()"
              class="w-full text-left flex items-center px-4 py-2 text-danger hover:bg-danger-bg transition-colors"
              type="button"
            >
              <app-generic-icon
                name="logout"
                svgClass="w-6 h-6"
                class="mr-3"
              ></app-generic-icon>
              <span class="font-medium text-lg">ออกจากระบบ</span>
            </button>
          </div>
        }
      </div>
    </div>
  </div>
</header>
