# ═══════════════════════════════════════════════════════════════
# RBMS-POS — Nginx Local Config (HTTP only, no SSL)
# ═══════════════════════════════════════════════════════════════

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - [$time_local] "$request" $status $body_bytes_sent';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 50M;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # ─── HTTP Server (port 80) ───
    server {
        listen 80;
        server_name localhost;

        # ─── API (Backend .NET) ───
        location /api/ {
            proxy_pass http://backend:5000/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ─── Swagger (เปิดใน Local เท่านั้น) ───
        location /swagger {
            proxy_pass http://backend:5000/swagger;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # ─── SignalR Hubs (WebSocket) ───
        location /hubs/ {
            proxy_pass http://backend:5000/hubs/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # ─── Health Check ───
        location /health {
            proxy_pass http://backend:5000/health;
        }

        # ─── Mobile-Web (Customer QR Scan) ───
        location /mobile/ {
            alias /usr/share/nginx/html/mobile/;
            try_files $uri $uri/ /mobile/index.html;
        }
        location = /mobile {
            return 301 /mobile/;
        }

        # ─── Frontend Client (Admin/Staff) — Default ───
        location / {
            root /usr/share/nginx/html/client;
            try_files $uri $uri/ /index.html;
        }
    }
}
