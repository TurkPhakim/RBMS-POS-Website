<app-card-template
  headerLabel="ลืมรหัสผ่าน"
  headerLabelClass="text-xl font-semibold text-primary-dark"
  contentClass="space-y-4"
>
  <!-- Info -->
  <div
    class="bg-primary-subtle border border-primary-light rounded-lg px-4 py-3 flex items-center gap-3"
  >
    <app-generic-icon
      class="text-primary shrink-0"
      name="information"
      svgClass="w-6 h-6"
    ></app-generic-icon>
    <p class="text-sm text-surface-dark">
      กรุณากรอก Email ที่ใช้ในการสมัคร
      <span class="font-semibold text-primary-dark"
        >ระบบจะส่งรหัส OTP ไปยังอีเมลของคุณ</span
      >
    </p>
  </div>

  <!-- Form -->
  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div>
      <label class="block text-base font-semibold text-surface-dark mb-2">
        Email
      </label>
      <div class="relative">
        <div
          class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-primary"
        >
          <i class="pi pi-envelope text-lg"></i>
        </div>
        <input
          type="text"
          formControlName="usernameOrEmail"
          placeholder="Email"
          class="block w-full pl-11 pr-4 py-3 border border-surface-border rounded-lg text-base placeholder-surface-sub focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition-colors"
        />
      </div>
      <app-field-error
        [control]="form.get('usernameOrEmail')!"
        label="Email"
      ></app-field-error>
    </div>
  </form>

  <p-footer>
    <p-button
      label="ยกเลิก"
      severity="secondary"
      [outlined]="true"
      [disabled]="isLoading()"
      (onClick)="onCancel()"
    ></p-button>
    <p-button
      label="ส่งรหัส OTP"
      [loading]="isLoading()"
      (onClick)="onSubmit()"
    ></p-button>
  </p-footer>
</app-card-template>
