@if (isOpen) {
<div
  class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center animate-modal-fade-in"
  (click)="onCancel()"
>
  <div
    class="bg-surface-card rounded-2xl shadow-xl p-6 max-w-sm w-full mx-4 animate-modal-scale-in"
    (click)="$event.stopPropagation()"
  >
    <!-- Icon -->
    <div class="flex justify-center mb-4">
      @if (type === 'delete') {
        <div class="w-16 h-16 rounded-full bg-danger-bg flex items-center justify-center">
          <app-generic-icon name="trash" svgClass="w-8 h-8" class="text-danger"></app-generic-icon>
        </div>
      } @else {
        <div class="w-16 h-16 rounded-full bg-warning-bg flex items-center justify-center">
          <app-generic-icon name="warning" svgClass="w-8 h-8" class="text-warning"></app-generic-icon>
        </div>
      }
    </div>

    <!-- Title -->
    <h3 class="text-card-title text-surface-dark text-center">{{ title }}</h3>

    <!-- Message -->
    <div class="mt-3 text-center space-y-1">
      <p class="text-sm text-surface-sub">
        {{ message }}@if (itemName) {<span class="font-semibold text-surface-dark"> "{{ itemName }}"</span>}?
      </p>
      @if (type === 'delete') {
        <p class="text-xs text-danger">This action cannot be undone.</p>
      }
    </div>

    <!-- Buttons -->
    <div class="flex gap-3 mt-6">
      <button
        (click)="onCancel()"
        class="flex-1 border border-surface-border hover:bg-surface text-surface-dark
               text-sm font-semibold px-4 py-2.5 rounded-lg transition-colors duration-200"
      >
        {{ cancelText }}
      </button>

      @if (type === 'delete') {
        <button
          (click)="onConfirm()"
          class="flex-1 bg-danger hover:bg-danger-dark text-white
                 text-sm font-semibold px-4 py-2.5 rounded-lg shadow-sm transition-colors duration-200"
        >
          {{ confirmText }}
        </button>
      } @else {
        <button
          (click)="onConfirm()"
          class="flex-1 bg-warning hover:bg-warning-dark text-white
                 text-sm font-semibold px-4 py-2.5 rounded-lg shadow-sm transition-colors duration-200"
        >
          {{ confirmText }}
        </button>
      }
    </div>
  </div>
</div>
}
