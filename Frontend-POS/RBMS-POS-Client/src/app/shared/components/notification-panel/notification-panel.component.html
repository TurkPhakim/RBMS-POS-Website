@if (isOpen$ | async) {
  <!-- Backdrop -->
  <div class="fixed inset-0 z-[998] bg-black/30" (click)="close()"></div>

  <!-- Panel -->
  <div
    class="fixed top-0 right-0 z-[999] h-full w-96 bg-surface-card flex flex-col"
  >
    <!-- Header -->
    <div
      class="bg-gradient-to-r from-primary to-primary-dark px-5 py-4 flex items-center justify-between"
    >
      <div class="flex items-center gap-3">
        <app-generic-icon
          name="bell"
          svgClass="w-6 h-6"
          class="text-white"
        ></app-generic-icon>
        <h3 class="text-lg font-bold text-white">การแจ้งเตือน</h3>
      </div>
      <button
        class="text-white/70 hover:text-white rounded-lg p-1 transition-colors"
        (click)="close()"
        type="button"
      >
        <i class="pi pi-times text-xl"></i>
      </button>
    </div>

    <!-- Empty State -->
    <div class="flex-1 flex items-center justify-center">
      <ng-lottie
        [options]="lottieOptions"
        width="180px"
        height="180px"
      ></ng-lottie>
    </div>
  </div>
}
