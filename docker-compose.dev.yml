# RBMS-POS — Development Dependencies
# ใช้สำหรับ SQL Server + MinIO เท่านั้น (Backend/Frontend รัน local)
#
# เริ่มใช้งาน:   docker compose -f docker-compose.dev.yml up -d
# หยุด:          docker compose -f docker-compose.dev.yml down
# ลบ data:       docker compose -f docker-compose.dev.yml down -v

services:
  # ─── SQL Server 2022 ───────────────────────────────────────
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: rbms-pos-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${SA_PASSWORD}
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$${MSSQL_SA_PASSWORD}" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ─── MinIO (S3-compatible storage) ─────────────────────────
  minio:
    image: minio/minio:latest
    container_name: rbms-pos-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ─── MinIO Init (สร้าง bucket อัตโนมัติ) ───────────────────
  minio-init:
    image: minio/mc:latest
    container_name: rbms-pos-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb local/$${MINIO_BUCKET_NAME} --ignore-existing;
      mc anonymous set download local/$${MINIO_BUCKET_NAME};
      echo 'Bucket $${MINIO_BUCKET_NAME} is ready';
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME:-rbms-pos-files}

volumes:
  sqlserver-data:
    name: rbms-pos-sqlserver-data
  minio-data:
    name: rbms-pos-minio-data
