<app-card-template [headerLabel]="headerLabel">
  <div class="space-y-4" [formGroup]="form">
    <div>
      <label class="block font-semibold mb-1">
        จำนวนลูกค้า <span class="text-danger">*</span>
      </label>
      <p-inputNumber
        formControlName="guestCount"
        [min]="1"
        [max]="table.capacity ?? 99"
        [showButtons]="true"
        buttonLayout="horizontal"
        incrementButtonIcon="pi pi-plus"
        decrementButtonIcon="pi pi-minus"
        inputStyleClass="text-center w-20"
        suffix=" คน"
      ></p-inputNumber>
      <app-field-error [control]="form.controls['guestCount']" label="จำนวนลูกค้า"></app-field-error>
    </div>

    <div>
      <label class="block font-semibold mb-1">
        ประเภทลูกค้า <span class="text-danger">*</span>
      </label>
      <div class="flex gap-4">
        @for (opt of guestTypeOptions; track opt.value) {
          <div class="flex items-center gap-2">
            <p-radioButton
              name="guestType"
              [value]="opt.value"
              formControlName="guestType"
            ></p-radioButton>
            <label>{{ opt.label }}</label>
          </div>
        }
      </div>
    </div>

    <div>
      <label class="block font-semibold mb-1">หมายเหตุ</label>
      <textarea
        pInputTextarea
        formControlName="note"
        [rows]="2"
        class="w-full"
        placeholder="หมายเหตุ (ถ้ามี)"
      ></textarea>
    </div>
  </div>

  <p-footer>
    <div class="flex justify-center gap-3">
      <p-button
        label="ยกเลิก"
        severity="secondary"
        [outlined]="true"
        (onClick)="onCancel()"
      ></p-button>
      <p-button
        label="เปิดโต๊ะ"
        severity="primary"
        [loading]="isSubmitting()"
        (onClick)="onSubmit()"
      ></p-button>
    </div>
  </p-footer>
</app-card-template>
