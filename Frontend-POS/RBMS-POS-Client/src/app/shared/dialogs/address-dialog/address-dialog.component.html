<app-card-template
  [headerLabel]="config.header!"
  headerLabelClass="text-xl font-semibold text-primary-dark"
>
  <form [formGroup]="form" class="grid grid-cols-3 gap-x-4 gap-y-3">
    <!-- ประเภทที่อยู่ -->
    <div>
      <label class="block font-semibold text-surface-dark mb-1"
        >ประเภทที่อยู่ <span class="text-danger">*</span></label
      >
      <app-address-type-dropdown
        formControlName="addressType"
      ></app-address-type-dropdown>
      <app-field-error
        [control]="form.get('addressType')"
        type="select"
      ></app-field-error>
    </div>

    <!-- เลขที่ -->
    <div>
      <label class="block font-semibold text-surface-dark mb-1"
        >เลขที่ <span class="text-danger">*</span></label
      >
      <input
        pInputText
        formControlName="houseNumber"
        class="w-full"
        placeholder="เลขที่"
      />
      <app-field-error
        [control]="form.get('houseNumber')"
        type="text"
      ></app-field-error>
    </div>

    <!-- อาคาร/หมู่บ้าน -->
    <div>
      <label class="block font-semibold text-surface-dark mb-1"
        >อาคาร/หมู่บ้าน</label
      >
      <input
        pInputText
        formControlName="building"
        class="w-full"
        placeholder="อาคาร/หมู่บ้าน"
      />
    </div>

    <!-- หมู่ -->
    <div>
      <label class="block font-semibold text-surface-dark mb-1">หมู่</label>
      <input
        pInputText
        formControlName="moo"
        class="w-full"
        placeholder="หมู่"
      />
    </div>

    <!-- ซอย -->
    <div>
      <label class="block font-semibold text-surface-dark mb-1">ซอย</label>
      <input
        pInputText
        formControlName="soi"
        class="w-full"
        placeholder="ซอย"
      />
    </div>

    <!-- แยก -->
    <div>
      <label class="block font-semibold text-surface-dark mb-1">แยก</label>
      <input
        pInputText
        formControlName="yaek"
        class="w-full"
        placeholder="แยก"
      />
    </div>

    <!-- ถนน -->
    <div>
      <label class="block font-semibold text-surface-dark mb-1">ถนน</label>
      <input
        pInputText
        formControlName="road"
        class="w-full"
        placeholder="ถนน"
      />
    </div>

    <!-- แขวง/ตำบล -->
    <div>
      <label class="block font-semibold text-surface-dark mb-1"
        >แขวง/ตำบล <span class="text-danger">*</span></label
      >
      <input
        pInputText
        formControlName="subDistrict"
        class="w-full"
        placeholder="แขวง/ตำบล"
      />
      <app-field-error
        [control]="form.get('subDistrict')"
        type="text"
      ></app-field-error>
    </div>

    <!-- เขต/อำเภอ -->
    <div>
      <label class="block font-semibold text-surface-dark mb-1"
        >เขต/อำเภอ <span class="text-danger">*</span></label
      >
      <input
        pInputText
        formControlName="district"
        class="w-full"
        placeholder="เขต/อำเภอ"
      />
      <app-field-error
        [control]="form.get('district')"
        type="text"
      ></app-field-error>
    </div>

    <!-- จังหวัด -->
    <div>
      <label class="block font-semibold text-surface-dark mb-1"
        >จังหวัด <span class="text-danger">*</span></label
      >
      <input
        pInputText
        formControlName="province"
        class="w-full"
        placeholder="จังหวัด"
      />
      <app-field-error
        [control]="form.get('province')"
        type="text"
      ></app-field-error>
    </div>

    <!-- รหัสไปรษณีย์ -->
    <div>
      <label class="block font-semibold text-surface-dark mb-1"
        >รหัสไปรษณีย์ <span class="text-danger">*</span></label
      >
      <input
        pInputText
        formControlName="postalCode"
        class="w-full"
        placeholder="รหัสไปรษณีย์"
      />
      <app-field-error
        [control]="form.get('postalCode')"
        type="text"
      ></app-field-error>
    </div>
  </form>

  <p-footer>
    <p-button
      label="ปิด"
      severity="secondary"
      [outlined]="true"
      [style]="{ 'min-width': '100px' }"
      (onClick)="onCancel()"
    ></p-button>
    <p-button label="ตกลง" [style]="{ 'min-width': '100px' }" (onClick)="onSave()"></p-button>
  </p-footer>
</app-card-template>
