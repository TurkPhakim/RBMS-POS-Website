<app-card-template
  [headerLabel]="config.header!"
  contentClass="p-4"
>
  <!-- Icon + Identity -->
  <div class="flex items-center gap-4">
    <div class="text-primary-dark shrink-0">
      <app-generic-icon
        name="lock-protect"
        svgClass="w-28 h-28"
      ></app-generic-icon>
    </div>
    <div class="text-left">
      <p class="font-bold text-3xl">{{ username }}</p>
      <p class="text-surface-sub mt-1 text-lg">
        กรุณายืนยันตัวตนด้วยรหัสผ่าน เพื่อดำเนินการต่อ
      </p>
    </div>
  </div>

  <!-- Password Form -->
  <form [formGroup]="passwordForm" (ngSubmit)="onSubmit()">
    <div>
      <label class="block text-lg font-semibold my-2">
        รหัสผ่าน
      </label>
      <div class="relative">
        <div
          class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-primary"
        >
          <app-generic-icon name="lock" svgClass="w-5 h-5"></app-generic-icon>
        </div>
        <input
          [type]="showPassword() ? 'text' : 'password'"
          formControlName="password"
          placeholder="กรอกรหัสผ่าน"
          autocomplete="current-password"
          pInputText
          class="w-full !pl-11 pr-11"
        />
        <button
          type="button"
          (click)="togglePasswordVisibility()"
          class="absolute inset-y-0 right-0 pr-4 flex items-center text-surface-sub hover:text-surface-dark transition-colors"
        >
          @if (!showPassword()) {
            <app-generic-icon name="eye" svgClass="w-5 h-5"></app-generic-icon>
          } @else {
            <app-generic-icon
              name="eye-off"
              svgClass="w-5 h-5"
            ></app-generic-icon>
          }
        </button>
      </div>
    </div>

    <app-field-error [control]="passwordForm.get('password')!"></app-field-error>
  </form>

  <p-footer>
    <p-button
      label="ยกเลิก"
      severity="secondary"
      [outlined]="true"
      [disabled]="isLoading()"
      (onClick)="onCancel()"
    ></p-button>
    <p-button
      label="ยืนยัน"
      [loading]="isLoading()"
      [disabled]="passwordForm.invalid"
      (onClick)="onSubmit()"
    ></p-button>
  </p-footer>
</app-card-template>
