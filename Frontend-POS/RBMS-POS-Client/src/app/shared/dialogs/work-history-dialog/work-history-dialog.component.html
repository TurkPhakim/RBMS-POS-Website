<app-card-template
  [headerLabel]="config.header!"
>
  <form [formGroup]="form" class="grid grid-cols-3 gap-x-4 gap-y-3">
    <!-- สถานที่ทำงาน -->
    <div>
      <label class="block font-semibold mb-1"
        >สถานที่ทำงาน <span class="text-danger">*</span></label
      >
      <input
        pInputText
        formControlName="workplace"
        class="w-full"
        placeholder="สถานที่ทำงาน"
      />
      <app-field-error [control]="form.get('workplace')"></app-field-error>
    </div>

    <!-- ตำแหน่งงาน -->
    <div>
      <label class="block font-semibold mb-1"
        >ตำแหน่งงาน <span class="text-danger">*</span></label
      >
      <input
        pInputText
        formControlName="position"
        class="w-full"
        placeholder="ตำแหน่งงาน"
      />
      <app-field-error [control]="form.get('position')"></app-field-error>
    </div>

    <!-- เบอร์โทรศัพท์ที่ทำงาน -->
    <div>
      <label class="block font-semibold mb-1"
        >เบอร์โทรศัพท์ที่ทำงาน</label
      >
      <input
        pInputText
        formControlName="workPhone"
        class="w-full"
        placeholder="เบอร์โทรศัพท์ที่ทำงาน"
        maxlength="10"
        (keypress)="'0123456789'.includes($event.key)"
        (paste)="$event.preventDefault()"
      />
    </div>

    <!-- วันที่เริ่มทำงาน -->
    <div>
      <label class="block font-semibold mb-1"
        >วันที่เริ่มทำงาน <span class="text-danger">*</span></label
      >
      <p-datepicker
        formControlName="startDate"
        dateFormat="dd/mm/yy"
        placeholder="วันที่เริ่มทำงาน"
        appendTo="body"
        styleClass="w-full"
      />
      <app-field-error
        [control]="form.get('startDate')"
        type="select"
      ></app-field-error>
    </div>

    <!-- วันที่สิ้นสุดทำงาน -->
    <div>
      <label class="block font-semibold mb-1"
        >วันที่สิ้นสุดทำงาน</label
      >
      <p-datepicker
        formControlName="endDate"
        dateFormat="dd/mm/yy"
        placeholder="วันที่สิ้นสุด"
        [minDate]="minEndDate()"
        appendTo="body"
        styleClass="w-full"
      />
    </div>
  </form>

  <p-footer>
    <p-button
      label="ปิด"
      severity="secondary"
      [outlined]="true"
      [style]="{ 'min-width': '100px' }"
      (onClick)="onCancel()"
    ></p-button>
    <p-button label="ตกลง" [style]="{ 'min-width': '100px' }" (onClick)="onSave()"></p-button>
  </p-footer>
</app-card-template>
