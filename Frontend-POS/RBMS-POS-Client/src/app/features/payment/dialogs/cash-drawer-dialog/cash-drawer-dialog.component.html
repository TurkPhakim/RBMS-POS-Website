<app-card-template [headerLabel]="config.header!">
  <div class="space-y-4">
    <form [formGroup]="form">
      <!-- Amount -->
      <div>
        <label class="block font-semibold mb-2">จำนวนเงิน (บาท)</label>
        <p-inputNumber
          formControlName="amount"
          [minFractionDigits]="2"
          [maxFractionDigits]="2"
          [min]="0"
          mode="decimal"
          styleClass="w-full"
          placeholder="0.00"
        ></p-inputNumber>
        <app-field-error [control]="form.controls['amount']" label="จำนวนเงิน"></app-field-error>
      </div>

      <!-- Reason -->
      <div class="mt-4">
        <label class="block font-semibold mb-2">เหตุผล</label>
        <textarea
          pInputTextarea
          formControlName="reason"
          rows="3"
          class="w-full"
          placeholder="ระบุเหตุผล"
        ></textarea>
        <app-field-error [control]="form.controls['reason']" label="เหตุผล"></app-field-error>
      </div>
    </form>
  </div>

  <p-footer>
    <button
      pButton
      label="ยกเลิก"
      severity="secondary"
      [outlined]="true"
      (click)="onCancel()"
    ></button>
    <button
      pButton
      [label]="isCashIn ? 'เงินเข้า' : 'เงินออก'"
      [severity]="isCashIn ? 'success' : 'warn'"
      [loading]="isSaving()"
      (click)="onSave()"
    ></button>
  </p-footer>
</app-card-template>
