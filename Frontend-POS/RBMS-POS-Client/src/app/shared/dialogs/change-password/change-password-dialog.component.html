<app-card-template [headerLabel]="config.header!" contentClass="p-4">
  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4">
    <!-- รหัสผ่านเก่า -->
    <div>
      <label class="block text-lg font-semibold mb-2">รหัสผ่านเก่า</label>
      <div class="relative">
        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-primary">
          <app-generic-icon name="lock" svgClass="w-5 h-5"></app-generic-icon>
        </div>
        <input
          [type]="showCurrentPassword() ? 'text' : 'password'"
          formControlName="currentPassword"
          placeholder="กรอกรหัสผ่านเก่า"
          autocomplete="current-password"
          pInputText
          class="w-full !pl-11 pr-11"
        />
        <button
          type="button"
          (click)="showCurrentPassword.set(!showCurrentPassword())"
          class="absolute inset-y-0 right-0 pr-4 flex items-center text-surface-sub hover:text-surface-dark transition-colors"
        >
          @if (!showCurrentPassword()) {
            <app-generic-icon name="eye" svgClass="w-5 h-5"></app-generic-icon>
          } @else {
            <app-generic-icon name="eye-off" svgClass="w-5 h-5"></app-generic-icon>
          }
        </button>
      </div>
      <app-field-error [control]="form.get('currentPassword')!"></app-field-error>
    </div>

    <!-- รหัสผ่านใหม่ -->
    <div>
      <label class="block text-lg font-semibold mb-2">รหัสผ่านใหม่</label>
      <div class="relative">
        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-primary">
          <app-generic-icon name="lock" svgClass="w-5 h-5"></app-generic-icon>
        </div>
        <input
          [type]="showNewPassword() ? 'text' : 'password'"
          formControlName="newPassword"
          placeholder="กรอกรหัสผ่านใหม่"
          autocomplete="new-password"
          pInputText
          class="w-full !pl-11 pr-11"
        />
        <button
          type="button"
          (click)="showNewPassword.set(!showNewPassword())"
          class="absolute inset-y-0 right-0 pr-4 flex items-center text-surface-sub hover:text-surface-dark transition-colors"
        >
          @if (!showNewPassword()) {
            <app-generic-icon name="eye" svgClass="w-5 h-5"></app-generic-icon>
          } @else {
            <app-generic-icon name="eye-off" svgClass="w-5 h-5"></app-generic-icon>
          }
        </button>
      </div>
      <app-field-error [control]="form.get('newPassword')!"></app-field-error>
    </div>

    <!-- ยืนยันรหัสผ่านใหม่ -->
    <div>
      <label class="block text-lg font-semibold mb-2">ยืนยันรหัสผ่านใหม่</label>
      <div class="relative">
        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-primary">
          <app-generic-icon name="lock" svgClass="w-5 h-5"></app-generic-icon>
        </div>
        <input
          [type]="showConfirmPassword() ? 'text' : 'password'"
          formControlName="confirmPassword"
          placeholder="กรอกยืนยันรหัสผ่านใหม่"
          autocomplete="new-password"
          pInputText
          class="w-full !pl-11 pr-11"
        />
        <button
          type="button"
          (click)="showConfirmPassword.set(!showConfirmPassword())"
          class="absolute inset-y-0 right-0 pr-4 flex items-center text-surface-sub hover:text-surface-dark transition-colors"
        >
          @if (!showConfirmPassword()) {
            <app-generic-icon name="eye" svgClass="w-5 h-5"></app-generic-icon>
          } @else {
            <app-generic-icon name="eye-off" svgClass="w-5 h-5"></app-generic-icon>
          }
        </button>
      </div>
      <app-field-error [control]="form.get('confirmPassword')!"></app-field-error>
    </div>

    <!-- Password Strength Indicator -->
    @if (form.get('newPassword')!.value) {
      <div class="text-right">
        <span class="text-surface-sub">ความยากในการสร้างรหัสผ่าน : </span>
        <span
          class="text-lg font-bold"
          [class.text-danger]="strength() === 'weak'"
          [class.text-warning]="strength() === 'medium'"
          [class.text-success]="strength() === 'strong'"
        >
          @switch (strength()) {
            @case ('weak') { ง่าย }
            @case ('medium') { ปานกลาง }
            @case ('strong') { ยาก }
          }
        </span>
      </div>
    }
  </form>

  <p-footer>
    <p-button
      label="ยกเลิก"
      severity="secondary"
      [outlined]="true"
      [disabled]="isLoading()"
      (onClick)="onCancel()"
    ></p-button>
    <p-button
      label="เปลี่ยนรหัสผ่าน"
      [loading]="isLoading()"
      (onClick)="onSubmit()"
    ></p-button>
  </p-footer>
</app-card-template>
