<app-card-template [headerLabel]="config.header!" contentClass="p-4">
  <!-- Gradient Header -->
  <div
    class="bg-gradient-to-r from-primary-dark to-primary rounded-xl p-6 mb-4 flex items-center gap-4 relative overflow-hidden"
  >
    <!-- Decorative Circles -->
    <div
      class="absolute -top-6 -right-6 w-28 h-28 rounded-full bg-white/10"
    ></div>
    <div
      class="absolute -bottom-4 -left-4 w-20 h-20 rounded-full bg-white/10"
    ></div>
    <div
      class="absolute top-1/2 right-1/3 w-10 h-10 rounded-full bg-white/5"
    ></div>
    <div
      class="absolute top-2 left-1/3 w-14 h-14 rounded-full bg-white/5"
    ></div>

    <!-- Lock Icon -->
    <div
      class="w-16 h-16 rounded-full bg-white/20 flex items-center justify-center shrink-0 ring-4 ring-white/20"
    >
      <app-generic-icon
        name="pin-password"
        svgClass="w-12 h-12"
        class="text-white"
      ></app-generic-icon>
    </div>

    <!-- Title + Username -->
    <div class="relative z-10">
      <p class="text-2xl font-bold text-white">ยืนยันตัวตน</p>
      <p class="text-white/70 text-lg">{{ username }}</p>
    </div>
  </div>

  <!-- Pin Keypad -->
  <app-pin-keypad
    #pinKeypad
    title="กรอกรหัส PIN 6 หลัก"
    [errorMessage]="errorMessage()"
    leftActionIcon="password-safe"
    (pinComplete)="onPinComplete($event)"
    (leftActionClick)="onForgotPin()"
  ></app-pin-keypad>

  <p-footer>
    <p-button
      label="ยกเลิก"
      severity="secondary"
      [outlined]="true"
      styleClass="!px-14"
      [disabled]="isLoading()"
      (onClick)="onCancel()"
    ></p-button>
  </p-footer>
</app-card-template>
