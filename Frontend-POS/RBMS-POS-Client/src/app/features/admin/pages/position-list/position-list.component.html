<div class="space-y-5">
  <!-- Page Header -->
  <div>
    <h1 class="text-page-title text-surface-dark">จัดการตำแหน่ง</h1>
  </div>

  <!-- Table -->
    <div class="bg-surface-card overflow-hidden border border-surface-border">
      <p-table [value]="positions()" [stripedRows]="true" [tableStyle]="{'min-width': '50rem'}">
        <ng-template pTemplate="header">
          <tr>
            <th class="w-16">#</th>
            <th>ชื่อตำแหน่ง</th>
            <th>คำอธิบาย</th>
            <th class="w-28 text-center">สถานะ</th>
            <th class="w-28 text-center">ตัวเลือก</th>
          </tr>
        </ng-template>
        <ng-template pTemplate="body" let-item let-i="rowIndex">
          <tr class="border-b border-surface-border hover:bg-primary-subtle transition-colors">
            <td class="text-primary font-semibold">{{ i + 1 }}</td>
            <td class="text-surface-dark font-semibold">{{ item.positionName }}</td>
            <td class="text-surface-sub">{{ item.description || '-' }}</td>
            <td class="text-center">
              @if (item.isActive) {
                <p-tag value="ใช้งาน" severity="success"></p-tag>
              } @else {
                <p-tag value="ปิดใช้งาน" severity="secondary"></p-tag>
              }
            </td>
            <td class="text-center">
              <div class="flex justify-center gap-2">
                <button
                  (click)="onEdit(item.positionId!)"
                  class="w-9 h-9 flex items-center justify-center rounded-full bg-primary-subtle hover:bg-primary-light text-primary transition-colors duration-200"
                  pTooltip="แก้ไข" tooltipPosition="top">
                  <app-generic-icon name="pen-edit" svgClass="w-4 h-4"></app-generic-icon>
                </button>
                <button
                  (click)="onDelete(item.positionId!, item.positionName!)"
                  class="w-9 h-9 flex items-center justify-center rounded-full bg-danger-bg hover:bg-danger text-danger hover:text-white transition-colors duration-200"
                  pTooltip="ลบ" tooltipPosition="top">
                  <app-generic-icon name="trash" svgClass="w-4 h-4"></app-generic-icon>
                </button>
              </div>
            </td>
          </tr>
        </ng-template>
        <ng-template pTemplate="emptymessage">
          <tr>
            <td colspan="5">
              <div class="flex justify-center items-center w-full p-[100px]">
                <app-empty-view message="ไม่พบข้อมูลตำแหน่ง" />
              </div>
            </td>
          </tr>
        </ng-template>
      </p-table>
    </div>
</div>
