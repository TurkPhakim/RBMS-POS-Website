@if (isOpen) {
<div
  class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center animate-modal-fade-in"
  (click)="onClose()"
>
  <div
    class="bg-surface-card rounded-2xl shadow-xl p-6 max-w-sm w-full mx-4 animate-modal-scale-in"
    (click)="$event.stopPropagation()"
  >
    <!-- Error Icon -->
    <div class="flex justify-center mb-4">
      <div class="w-16 h-16 rounded-full bg-danger-bg flex items-center justify-center">
        <app-generic-icon name="error" svgClass="w-8 h-8" class="text-danger"></app-generic-icon>
      </div>
    </div>

    <!-- Title & Message -->
    <div class="text-center space-y-1.5">
      <h3 class="text-section-title text-danger">{{ title }}</h3>
      @if (message) {
        <p class="text-sm text-surface-sub">{{ message }}</p>
      }
    </div>

    <!-- Close Button -->
    <button
      (click)="onClose()"
      class="mt-6 w-full bg-danger hover:bg-danger-dark text-white
             text-sm font-semibold px-4 py-2.5 rounded-lg shadow-sm
             transition-colors duration-200"
    >
      {{ closeButtonText }}
    </button>
  </div>
</div>
}
